<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contato | Nanda Empodera</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container navbar">
      <a href="../index.html" class="logo">Nanda<span>.Empodera</span></a>
      <nav>
        <ul>
          <li><a href="../index.html">Início</a></li>
          <li><a href="../index.html#historia">História</a></li>
          <li><a href="cursos.html">Cursos</a></li>
          <li><a href="mentoria.html">Mentoria</a></li>
          <li><a href="eventos.html">Eventos</a></li>
          <li><a class="active" href="contato.html">Contato</a></li>
        </ul>
      </nav>
    </div>
  </header>
  <main>
    <section class="section" style="padding-top:4rem;">
      <div class="container contact-wrapper">
        <div class="contact-info">
          <h3>Fale Comigo</h3>
            <p>Envie uma mensagem para parcerias, contratação de palestras, entrevistas ou dúvidas sobre programas.</p>
            <div class="socials">
              <a aria-label="Instagram" href="#">IG</a>
              <a aria-label="LinkedIn" href="#">IN</a>
              <a aria-label="YouTube" href="#">YT</a>
              <a aria-label="WhatsApp" href="#">WA</a>
            </div>
        </div>
        <div>
          <form id="formContato" class="contact-form">
            <div class="row">
              <input name="nome" required type="text" placeholder="Nome" />
              <input name="email" required type="email" placeholder="E-mail" />
            </div>
            <div class="row">
              <input name="assunto" type="text" placeholder="Assunto" />
              <input name="telefone" type="tel" placeholder="Telefone" maxlength="20" required />
            </div>
            <div class="row">
              <select name="tipo">
                <option value="">Tipo de contato</option>
                <option value="Mentoria">Mentoria</option>
                <option value="Cursos">Cursos</option>
                <option value="Eventos">Eventos</option>
                <option value="Parceria">Parceria</option>
              </select>
            </div>
            <textarea name="mensagem" placeholder="Mensagem" required></textarea>
            <button class="btn" type="submit">Enviar via WhatsApp</button>
          </form>
        </div>
      </div>
    </section>
  </main>
  <footer class="site-footer">
    <div class="container copy">© <span id="ano"></span> Nanda Empodera.</div>
  </footer>
  <script>document.getElementById('ano').textContent=new Date().getFullYear();</script>
  <script src="../js/forms.js" defer></script>
</body>
</html>
